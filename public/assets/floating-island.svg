<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="island1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="island2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="pathGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD93D" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#FFD93D" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="600" height="400" fill="url(#sky)"/>

  <!-- Clouds -->
  <ellipse cx="120" cy="60" rx="60" ry="20" fill="white" opacity="0.6"/>
  <ellipse cx="150" cy="50" rx="40" ry="15" fill="white" opacity="0.5"/>
  <ellipse cx="450" cy="80" rx="50" ry="18" fill="white" opacity="0.5"/>
  <ellipse cx="480" cy="70" rx="35" ry="12" fill="white" opacity="0.4"/>

  <!-- Path/road connecting islands -->
  <path d="M 50 280 Q 150 240 200 200 Q 280 140 350 180 Q 420 220 480 160 Q 520 120 560 80" 
        stroke="url(#pathGlow)" stroke-width="6" fill="none" stroke-dasharray="8 6" filter="url(#glow)"/>
  
  <!-- Path nodes -->
  <circle cx="200" cy="200" r="8" fill="#5B6BF5" stroke="white" stroke-width="3" filter="url(#glow)"/>
  <circle cx="350" cy="180" r="10" fill="#FFB347" stroke="white" stroke-width="3" filter="url(#glow)"/>
  <circle cx="480" cy="160" r="8" fill="#5B6BF5" stroke="white" stroke-width="3"/>

  <!-- Floating Island 1 - Forest Island (past) -->
  <g transform="translate(40, 220)">
    <ellipse cx="80" cy="60" rx="100" ry="30" fill="#C7D2FE"/>
    <ellipse cx="80" cy="40" rx="80" ry="20" fill="url(#grass)"/>
    <!-- Trees -->
    <circle cx="45" cy="25" r="18" fill="#34D399"/>
    <circle cx="80" cy="15" r="22" fill="#10B981"/>
    <circle cx="115" cy="25" r="16" fill="#34D399"/>
    <!-- Trunks -->
    <rect x="43" y="30" width="4" height="12" rx="2" fill="#92400E"/>
    <rect x="78" y="22" width="4" height="15" rx="2" fill="#92400E"/>
    <rect x="113" y="30" width="4" height="12" rx="2" fill="#92400E"/>
  </g>

  <!-- Floating Island 2 - Castle Island (current/goal) -->
  <g transform="translate(380, 60)">
    <!-- Island base -->
    <ellipse cx="100" cy="100" rx="130" ry="40" fill="#DDD6FE"/>
    <ellipse cx="100" cy="80" rx="110" ry="28" fill="url(#grass)"/>
    
    <!-- Castle -->
    <rect x="70" y="30" width="60" height="50" rx="4" fill="#A78BFA"/>
    <rect x="60" y="20" width="20" height="60" rx="3" fill="#8B5CF6"/>
    <rect x="120" y="20" width="20" height="60" rx="3" fill="#8B5CF6"/>
    <!-- Castle top -->
    <rect x="65" y="12" width="10" height="10" rx="2" fill="#C4B5FD"/>
    <rect x="125" y="12" width="10" height="10" rx="2" fill="#C4B5FD"/>
    <!-- Door -->
    <rect x="88" y="55" width="24" height="25" rx="12" fill="#7C3AED"/>
    <!-- Windows -->
    <circle cx="85" cy="42" r="6" fill="#DDD6FE"/>
    <circle cx="115" cy="42" r="6" fill="#DDD6FE"/>
    <!-- Flag -->
    <line x1="100" y1="30" x2="100" y2="10" stroke="#FFB347" stroke-width="2"/>
    <polygon points="100,10 120,16 100,22" fill="#FFB347"/>
    
    <!-- Stars around castle -->
    <text x="140" y="25" font-size="14" fill="#FFD93D" filter="url(#glow)">✦</text>
    <text x="45" y="35" font-size="10" fill="#FFD93D">✦</text>
  </g>

  <!-- Floating Island 3 - Small starting island -->
  <g transform="translate(500, 250)">
    <ellipse cx="40" cy="30" rx="60" ry="18" fill="#E0E7FF"/>
    <ellipse cx="40" cy="18" rx="50" ry="14" fill="#A7F3D0"/>
  </g>

  <!-- Labels -->
  <text x="75" y="290" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">起点·五升六</text>
  <text x="275" y="165" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="500">六升七暑假</text>
  <text x="480" y="145" text-anchor="middle" font-size="11" fill="#5B6BF5" font-weight="600">交附嘉分</text>
</svg>