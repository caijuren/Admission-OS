<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" fill="none">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="40%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <linearGradient id="mt1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B6BF5"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="mt2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="mt3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CD7A4"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="mt4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="sunFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="350" fill="url(#skyGrad)"/>

  <!-- Sun -->
  <circle cx="650" cy="70" r="35" fill="url(#sunGrad)" filter="url(#sunFilter)" opacity="0.9"/>

  <!-- Clouds -->
  <g opacity="0.7">
    <ellipse cx="150" cy="50" rx="70" ry="22" fill="white"/>
    <ellipse cx="180" cy="40" rx="50" ry="18" fill="white"/>
    <ellipse cx="120" cy="45" rx="45" ry="15" fill="white"/>
  </g>
  <g opacity="0.5">
    <ellipse cx="500" cy="35" rx="55" ry="18" fill="white"/>
    <ellipse cx="530" cy="28" rx="40" ry="14" fill="white"/>
  </g>
  <g opacity="0.4">
    <ellipse cx="350" cy="70" rx="40" ry="12" fill="white"/>
  </g>

  <!-- Far mountains (background) -->
  <polygon points="0,250 80,160 150,240 220,180 300,230 380,150 450,240 550,170 620,230 700,190 800,250 800,350 0,350" fill="#C7D2FE" opacity="0.5"/>

  <!-- Middle mountains -->
  <polygon points="0,280 100,200 180,260 260,190 350,250 420,180 500,240 580,170 650,220 720,190 800,250 800,350 0,350" fill="url(#mt4)" opacity="0.7"/>

  <!-- Main mountains -->
  <polygon points="0,300 120,180 200,250 300,170 400,240 500,160 580,230 680,180 800,260 800,350 0,350" fill="url(#mt1)" opacity="0.85"/>

  <!-- Snow caps -->
  <polygon points="120,180 100,200 125,200 140,195 150,210" fill="white" opacity="0.8"/>
  <polygon points="300,170 285,190 310,188 320,183 335,200" fill="white" opacity="0.8"/>
  <polygon points="500,160 482,180 505,178 512,172 525,190" fill="white" opacity="0.8"/>

  <!-- Foreground hills -->
  <ellipse cx="400" cy="340" rx="450" ry="60" fill="#A7F3D0" opacity="0.4"/>
  <ellipse cx="200" cy="350" rx="350" ry="50" fill="#6EE7B7" opacity="0.3"/>
  <ellipse cx="650" cy="345" rx="300" ry="45" fill="#86EFAC" opacity="0.3"/>

  <!-- Small trees on hills -->
  <g transform="translate(100, 280)">
    <rect x="3" y="10" width="4" height="15" rx="2" fill="#78350F"/>
    <circle cx="5" cy="5" r="12" fill="#4ADE80"/>
  </g>
  <g transform="translate(680, 275)">
    <rect x="3" y="10" width="4" height="15" rx="2" fill="#78350F"/>
    <circle cx="5" cy="5" r="12" fill="#4ADE80"/>
  </g>

  <!-- Child figure (small silhouette) -->
  <g transform="translate(350, 240)">
    <!-- Body -->
    <circle cx="8" cy="4" r="5" fill="#1E293B" opacity="0.6"/>
    <rect x="4" y="9" width="8" height="12" rx="3" fill="#1E293B" opacity="0.6"/>
    <!-- Legs -->
    <rect x="5" y="19" width="2.5" height="8" rx="1" fill="#1E293B" opacity="0.6"/>
    <rect x="8.5" y="19" width="2.5" height="8" rx="1" fill="#1E293B" opacity="0.6"/>
  </g>

  <!-- Birds -->
  <text x="280" y="90" font-size="16" fill="#94A3B8" opacity="0.6">︿</text>
  <text x="310" y="80" font-size="12" fill="#94A3B8" opacity="0.5">︿</text>
  <text x="420" y="100" font-size="14" fill="#94A3B8" opacity="0.5">︿</text>
</svg>