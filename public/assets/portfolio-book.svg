<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" fill="none">
  <defs>
    <linearGradient id="bookLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="bookRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="coverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B6BF5"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <filter id="bookShadow">
      <feDropShadow dx="3" dy="5" stdDeviation="8" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#bookShadow)">
    <!-- Book spine/cover background -->
    <!-- Left page -->
    <rect x="40" y="30" width="250" height="340" rx="8" fill="url(#bookLeft)" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Right page -->
    <rect x="290" y="30" width="250" height="340" rx="8" fill="url(#bookRight)" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Spine -->
    <rect x="282" y="30" width="16" height="340" fill="#4F46E5" rx="2"/>
    <!-- Spine text -->
    <text x="290" y="200" text-anchor="middle" font-size="10" fill="white" transform="rotate(-90, 290, 200)" font-weight="bold">EDUOS PASSPORT</text>
    
    <!-- Center crease shadow -->
    <line x1="290" y1="35" x2="290" y2="365" stroke="#CBD5E1" stroke-width="0.5"/>
  </g>

  <!-- LEFT PAGE CONTENT -->
  <!-- Profile header -->
  <rect x="55" y="50" width="220" height="55" rx="10" fill="url(#coverGrad)"/>
  <text x="165" y="72" text-anchor="middle" font-size="16" fill="white" font-weight="bold">张明远</text>
  <text x="165" y="92" text-anchor="middle" font-size="11" fill="#C7D2FE">南翔中学 · 六年级</text>

  <!-- Stats grid on left page -->
  <!-- Reading -->
  <rect x="60" y="120" width="100" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="110" y="145" text-anchor="middle" font-size="18" fill="#5B6BF5" font-weight="bold">28</text>
  <text x="110" y="165" text-anchor="middle" font-size="10" fill="#6B7280">阅读书籍</text>

  <!-- Highest Score -->
  <rect x="170" y="120" width="100" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="220" y="145" text-anchor="middle" font-size="18" fill="#4CD7A4" font-weight="bold">385</text>
  <text x="220" y="165" text-anchor="middle" font-size="10" fill="#6B7280">最高分</text>

  <!-- Honors -->
  <rect x="60" y="195" width="100" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="110" y="220" text-anchor="middle" font-size="18" fill="#FFB347" font-weight="bold">4</text>
  <text x="110" y="240" text-anchor="middle" font-size="10" fill="#6B7280">荣誉奖项</text>

  <!-- Projects -->
  <rect x="170" y="195" width="100" height="60" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="220" y="220" text-anchor="middle" font-size="18" fill="#8B5CF6" font-weight="bold">2</text>
  <text x="220" y="240" text-anchor="middle" font-size="10" fill="#6B7280">项目成果</text>

  <!-- Target school -->
  <rect x="60" y="270" width="210" height="40" rx="8" fill="#FFF7ED" stroke="#FFB347" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="165" y="295" text-anchor="middle" font-size="13" fill="#92400E" font-weight="600">目标：交附嘉分</text>

  <!-- Quote -->
  <text x="165" y="340" text-anchor="middle" font-size="10" fill="#94A3B8" font-style="italic">"成长，是最好的投资。" — EduOS</text>

  <!-- RIGHT PAGE CONTENT -->
  <!-- Timeline header -->
  <rect x="305" y="50" width="220" height="35" rx="8" fill="#F8FAFC"/>
  <text x="415" y="73" text-anchor="middle" font-size="13" fill="#1E293B" font-weight="bold">成长时间线</text>

  <!-- Timeline entries on right page -->
  <!-- Entry 1 -->
  <line x1="330" y1="105" x2="330" y2="340" stroke="#E2E8F0" stroke-width="2"/>
  <circle cx="330" cy="110" r="5" fill="#5B6BF5"/>
  <text x="348" y="108" font-size="11" fill="#1E293B" font-weight="600">达成交附嘉分目标</text>
  <text x="348" y="122" font-size="9" fill="#94A3B8">2028.07</text>

  <circle cx="330" cy="160" r="5" fill="#4CD7A4"/>
  <text x="348" y="158" font-size="11" fill="#1E293B" font-weight="600">完成AI古文助手项目</text>
  <text x="348" y="172" font-size="9" fill="#94A3B8">2027.12</text>

  <circle cx="330" cy="210" r="5" fill="#FFB347"/>
  <text x="348" y="208" font-size="11" fill="#1E293B" font-weight="600">完成《济公全传》</text>
  <text x="348" y="222" font-size="9" fill="#94A3B8">2026.07</text>

  <circle cx="330" cy="260" r="5" fill="#8B5CF6"/>
  <text x="348" y="258" font-size="11" fill="#1E293B" font-weight="600">数学竞赛二等奖</text>
  <text x="348" y="272" font-size="9" fill="#94A3B8">2026.06</text>

  <!-- Export button -->
  <rect x="350" y="300" width="130" height="32" rx="16" fill="#5B6BF5"/>
  <text x="415" y="321" text-anchor="middle" font-size="11" fill="white" font-weight="600">导出 PDF</text>

  <!-- Page decorations -->
  <text x="525" y="365" font-size="18" fill="#E2E8F0">✦</text>
  <text x="60" y="370" font-size="14" fill="#E2E8F0">✦</text>
</svg>